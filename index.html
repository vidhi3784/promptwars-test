<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown & Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .text-gradient {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-cyan-600/20 blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-4xl grid md:grid-cols-2 gap-8 z-10">
        
        <!-- Timer Section -->
        <div class="glass-panel rounded-3xl p-8 flex flex-col justify-center items-center relative overflow-hidden group hover:border-white/10 transition-colors duration-500">
            <h2 class="text-xl font-semibold mb-6 tracking-wider text-gray-400 self-start">Launch Countdown</h2>
            
            <div class="grid grid-cols-4 gap-4 text-center w-full my-6">
                <div class="flex flex-col items-center">
                    <span id="days" class="text-4xl md:text-5xl font-bold text-gradient">00</span>
                    <span class="text-xs mt-2 text-gray-500 uppercase tracking-widest font-semibold">Days</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="hours" class="text-4xl md:text-5xl font-bold text-gradient">00</span>
                    <span class="text-xs mt-2 text-gray-500 uppercase tracking-widest font-semibold">Hours</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="minutes" class="text-4xl md:text-5xl font-bold text-gradient">00</span>
                    <span class="text-xs mt-2 text-gray-500 uppercase tracking-widest font-semibold">Mins</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="seconds" class="text-4xl md:text-5xl font-bold text-gradient">00</span>
                    <span class="text-xs mt-2 text-gray-500 uppercase tracking-widest font-semibold">Secs</span>
                </div>
            </div>
            
            <div class="w-full mt-auto pt-6 border-t border-white/5 flex justify-between items-center text-sm text-gray-400 font-medium">
                <span>Target Date & Time</span>
                <span class="text-blue-400">Apr 4, 2026 • 18:00</span>
            </div>
        </div>

        <!-- Notes Section -->
        <div class="glass-panel rounded-3xl p-8 relative flex flex-col hover:border-white/10 transition-colors duration-500">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-gray-200">Project Notes</h2>
                <div class="flex items-center gap-2">
                    <div id="save-indicator" class="w-2 h-2 rounded-full bg-green-500 opacity-0 transition-opacity duration-300 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                    <span id="save-status" class="text-xs text-gray-400 opacity-0 transition-opacity duration-300 font-medium">Saved to LocalStorage</span>
                </div>
            </div>
            <textarea id="notes-area" class="w-full flex-grow min-h-[250px] bg-black/20 border border-white/5 rounded-2xl p-5 text-gray-300 focus:outline-none focus:border-blue-500/30 focus:bg-black/30 resize-none transition-all placeholder-gray-600 leading-relaxed font-light" placeholder="Jot down your project ideas, tasks, or milestones here..."></textarea>
        </div>

    </div>

    <script>
        // Countdown Logic
        const targetDate = new Date('2026-04-04T18:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
                document.getElementById('seconds').innerText = "00";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Notes Logic
        const notesArea = document.getElementById('notes-area');
        const saveStatus = document.getElementById('save-status');
        const saveIndicator = document.getElementById('save-indicator');
        let saveTimeout;

        // Load notes on init
        const savedNotes = localStorage.getItem('projectCountdownNotes');
        if (savedNotes !== null) {
            notesArea.value = savedNotes;
        }

        // Save notes on input with debounce
        notesArea.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveStatus.style.opacity = '0';
            saveIndicator.style.opacity = '0';
            
            saveTimeout = setTimeout(() => {
                localStorage.setItem('projectCountdownNotes', notesArea.value);
                saveStatus.style.opacity = '1';
                saveIndicator.style.opacity = '1';
                setTimeout(() => {
                    saveStatus.style.opacity = '0';
                    saveIndicator.style.opacity = '0';
                }, 2000);
            }, 600);
        });
    </script>
</body>
</html>
